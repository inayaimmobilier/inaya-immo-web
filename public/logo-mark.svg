<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Inaya Immo">
  <defs>
    <linearGradient id="inaya-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- sceau -->
  <rect width="64" height="64" rx="15" fill="url(#inaya-g)"/>
  <!-- l'arc protecteur (inaya = la garde bienveillante) — cercle C(32,37.2) r19.2,
       ouvert de 78° à 102° pour recevoir la clé de voûte d'ambre -->
  <path d="M13 40 A 19.2 19.2 0 0 1 26.1 18.9" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M37.9 18.9 A 19.2 19.2 0 0 1 51 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3.2" stroke-linecap="round"/>
  <!-- la clé de voûte : l'ambre posé sur la ligne exacte de l'arc -->
  <circle cx="32" cy="18" r="2.4" fill="#F59E0B"/>
  <!-- la maison -->
  <path d="M32 26 L41.5 33.5 V46 H22.5 V33.5 Z" fill="#FFFFFF"/>
  <!-- la porte allumée (arche ambre) -->
  <path d="M29.3 46 V40.7 A 2.7 2.7 0 0 1 34.7 40.7 V46 Z" fill="#F59E0B"/>
</svg>
